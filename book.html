<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Detail | Myanmar Legal Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="loader-wrapper" id="loader">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-inner"></div>
            <i class="fas fa-gavel loader-logo"></i>
        </div>
        <div class="loader-text">LOADING BOOK DETAILS...</div>
    </div>

    <header>
        <a href="index.html" class="logo">
            <i class="fas fa-gavel"></i>
            <span>Legal Library</span>
        </a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#categories">Categories</a>
            <a href="index.html#latest">Latest</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main id="book-detail-content">
        <!-- Content generated by JS -->
        <div style="text-align: center; padding: 5rem;">Loading book details...</div>
    </main>

    <!-- PDF Viewer Modal -->
    <div class="pdf-viewer-container" id="pdf-viewer">
        <div class="pdf-header">
            <h3 id="viewer-title">PDF Reader</h3>
            <div class="close-viewer" onclick="closeReader()"><i class="fas fa-times"></i></div>
        </div>
        <iframe id="pdf-iframe" src="" allow="autoplay"></iframe>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">Legal Library</div>
            <p>&copy; 2024 Myanmar Legal Book Library. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
