<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Detail | Myanmar Legal Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="loader-wrapper" id="loader">
        <div class="loader-container">
            <div class="loader"></div>
            <div class="loader-inner"></div>
            <i class="fas fa-gavel loader-logo"></i>
        </div>
        <div class="loader-text">PREPARING LEGAL ARCHIVES...</div>
    </div>

    <header class="app-header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <i class="fas fa-balance-scale"></i>
                <span>Legal Library</span>
            </a>
            
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="index.html#categories">Categories</a>
                <a href="index.html#latest">Latest</a>
                <a href="#">About</a>
            </nav>

            <div class="mobile-menu-toggle" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <main class="main-content" style="margin-top: 80px;">
        <div id="book-detail-content">
            <!-- Content generated by JS -->
            <div style="text-align: center; padding: 5rem;">Loading book details...</div>
        </div>
    </main>

    <!-- PDF Viewer Modal -->
    <div class="pdf-viewer-container" id="pdf-viewer">
        <div class="pdf-header">
            <h3 id="viewer-title">Legal Document Reader</h3>
            <div class="close-viewer" onclick="closeReader()"><i class="fas fa-times"></i></div>
        </div>
        <iframe id="pdf-iframe" src="" allow="autoplay"></iframe>
    </div>

    <footer class="app-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <div class="logo">
                    <i class="fas fa-balance-scale"></i>
                    <span>Legal Library</span>
                </div>
                <p>The most comprehensive digital archive of Myanmar legal books and documents.</p>
                <div class="social-links">
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 Myanmar Legal Book Library. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
